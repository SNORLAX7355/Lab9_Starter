<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    window.onerror = function(msg, src, lineno, colno, err) {
      console.log("Global Error Trigger");
      console.log(msg);
      return true;
    }
    
    class CalcError extends Error {
      constructor(msg) {
        super(msg);
        this.name = "Calc Error";
      }
    }

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      try {
        let firstNum = document.querySelector('#first-num').value;
        let secondNum = document.querySelector('#second-num').value;
        let operator = document.querySelector('#operator').value;

        if (firstNum == "" || secondNum == "") {
          throw new CalcError("Blank input");
        }
        if (isNaN(firstNum) || isNaN(secondNum)) {
          throw new CalcError("Not valid numbers");
        }
        if (operator == "/" && Number(secondNum) == 0) {
          throw new CalcError("Divide by zero error");
        }

        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (error) {
        if (error instanceof CalcError) {
          console.warn(error.message);
          output.textContent = error.message
        } else {
          console.error(error);
          output.textContent = error.message;
        }
      } finally {
        console.log("Calculation done");
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
    errorBtns.forEach(button => {
      button.addEventListener('click', event => {
        e.preventDefault();
        switch (button.textContent) {
          case "Console Log":
            console.log('Console Log Demo');
            break;
          case "Console Error":
            console.error('Console Error');
            break;
          case "Console Count":
            console.count("Count Button Pressed");
            break;
          case "Console Warn":
            console.warn("Console Warning");
            break;
          case "Console Assert":
            console.assert(false, "Console Assertion Failed");
            break;
          case "Console Clear":
            console.clear();
            break;
          case "Console Dir":
            console.dir(document.querySelector('form'));
            break;
          case "Console dirxml":
            console.dirxml(document.querySelector('form'));
            break;
          case "Console Group Start":
            console.group("Console Group Start");
            break;
          case "Console Group End":
            console.groupEnd();
            break;
          case "Console Table":
            console.table([
              { class: "CSE 110", grade: "B"},
              { class: "CSE 120", grade: "A-"},
              { class: "CCE 3", grade: "A+"},
              { class: "ECON 100A", grade: "A"},
            ]);
            break;
          case "Start Timer":
            console.time("Timer");
            break;
          case "End Timer":
            console.timeEnd("Timer");
            break;
          case "Console Trace":
            console.trace("Trace Demo");
            break;
          case "Trigger a Global Error":
            variable.yes();
            break;
        }
      });
    });
  </script>
</body>

</html>
